# Splits no ajustados en las series OHLCV descargadas de Primary S.A.
# Verificado contra fuentes externas (investing.com, digrin.com) y
# validado empíricamente con validate_variation.py
#
# Formato por entrada:
#   ticker: código del instrumento
#   date: fecha efectiva del split en la serie (día hábil siguiente al anuncio)
#   ratio: factor de desdoblamiento (ej: 2.0 significa que 1 acción pasó a ser 2)
#   source: fuente de verificación
#   in_index: si el ticker estaba en el RFX20 en esa fecha (impacta Enfoque A)
#   verified: si fue confirmado manualmente
#   notes: observaciones adicionales

splits:
  - ticker: COME
    date: "2019-08-05"
    ratio: 1.7
    source: "investing.com + validate_variation.py"
    in_index: true
    verified: true
    notes: "Desdoblamiento 1.7:1 confirmado. En índice desde 2018-06-29."

  - ticker: COME
    date: "2025-08-13"
    ratio: 2.2443
    source: "investing.com + validate_variation.py"
    in_index: true
    verified: true
    notes: "Desdoblamiento 2.2443:1 (561/250). En índice hasta la fecha."

  - ticker: AGRO
    date: "2023-11-03"
    ratio: 12.0
    source: "validate_variation.py"
    in_index: false
    verified: true
    notes: "Desdoblamiento 12:1. Ingresó al índice el 2024-05-02, posterior al split."

  - ticker: MORI
    date: "2018-08-01"
    ratio: 1.8348
    source: "validate_variation.py"
    in_index: false
    verified: true
    notes: "Desdoblamiento 1.8348:1. Ingresó al índice el 2020-10-01, posterior al split."

  - ticker: MORI
    date: "2025-09-05"
    ratio: 7.0947
    source: "validate_variation.py"
    in_index: false
    verified: true
    notes: "Desdoblamiento 7.0947:1. Salió del índice el 2020-12-30, anterior al split."

  - ticker: BYMA
    date: "2022-07-06"
    ratio: 10.0
    source: "base.dividendos2.csv (AC monto=9) + confirmación equipo Primary S.A."
    in_index: true
    verified: true
    type: "ac_split"
    notes: >
      Dividendo en acciones de monto 9 (por cada acción se recibieron 9 nuevas).
      Equivale a split 10:1. El equipo del índice confirmó que se aplicó
      fórmula de dividendo en lugar de tratamiento de split, licuando la
      participación. A partir de este evento se estableció la regla:
      AC con monto >= 1 se trata como split.
      Tipo en dataset original: AC (no EF ni split puro).

  - ticker: BYMA
    date: "2024-05-10"
    ratio: 5.0
    source: "Excel dividendos en especie (Primary S.A.) + confirmación equipo"
    in_index: true
    verified: true
    type: "split_puro"
    notes: >
      Split puro 5:1. No registrado en base.dividendos2.csv — los splits
      puros se registran manualmente en Excel separado.
      El mismo día hubo dividendo EF de CRES.
      Tratamiento: multiplicar cantidades de BYMA en el índice por 5.
      Pendiente: obtener Excel completo de dividendos en especie.

# Eventos macroeconómicos identificados como falsos positivos en validate_variation.py
# NO son splits — son movimientos reales del mercado que se documentan para
# uso como variables dummy en el módulo de feature engineering
macro_events:
  - date: "2019-08-12"
    description: "Elecciones PASO — derrota inesperada de Macri vs Fernández"
    tickers_affected: ["BYMA", "EDN", "GGAL", "PAMP", "SUPV", "TGSU2"]
    direction: "negative"
    notes: "Caída sistémica del mercado. No requiere ajuste de serie."

  - date: "2023-11-21"
    description: "Elecciones presidenciales — victoria de Milei"
    tickers_affected: ["AGRO", "BMA", "METR", "YPFD"]
    direction: "positive"
    notes: "Suba sistémica del mercado. No requiere ajuste de serie."

# Datos sucios identificados — a tratar en módulo processing/
dirty_data:
  - ticker: BBAR
    date: "2019-06-11"
    field: "open"
    value: 260.0
    expected_range: [140.0, 160.0]
    notes: "Precio de apertura anómalo. Close anterior: 142.6. Posible error de feed."

